<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Page not found — LearnLu"/>
  <meta name="robots" content="noindex"/>
  <title>Page Not Found — LearnLu</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--off-white);
      font-family: var(--font-b);
      padding: 24px;
    }
    .error-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 56px 48px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-lg);
    }
    .error-num {
      font-family: var(--font-d);
      font-size: 5rem;
      font-weight: 900;
      color: var(--blue);
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
    .error-card h1 {
      font-family: var(--font-d);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }
    .error-card p {
      color: var(--text-2);
      line-height: 1.75;
      margin-bottom: 28px;
      font-size: 1rem;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 13px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-b);
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 20px;
    }
    .btn-home:hover { background: var(--blue-dk); color: #fff; }
    .quick-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .ql-item {
      background: var(--off-white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      text-align: left;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
      display: block;
    }
    .ql-item:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); }
    .ql-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    .ql-title { font-size: 0.875rem; font-weight: 600; display: block; }
    .ql-desc { font-size: 0.78rem; color: var(--text-3); margin-top: 2px; }
    @media (max-width: 480px) {
      .error-card { padding: 36px 24px; }
      .error-num { font-size: 4rem; }
      .quick-links { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-num">404</div>
    <span class="error-icon">🔍</span>
    <h1>Page Not Found</h1>
    <p>Oops! The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

    <a href="index.html" class="btn-home">🏠 Back to Home</a>

    <div class="quick-links">
      <a href="pages/lessons.html" class="ql-item">
        <span class="ql-icon">📚</span>
        <span class="ql-title">All 35 Lessons</span>
        <span class="ql-desc">Browse every lesson</span>
      </a>
      <a href="pages/lesson-hardware.html" class="ql-item">
        <span class="ql-icon">🖥️</span>
        <span class="ql-title">Hardware Lesson</span>
        <span class="ql-desc">Start from the beginning</span>
      </a>
      <a href="pages/lesson-internet.html" class="ql-item">
        <span class="ql-icon">🌐</span>
        <span class="ql-title">Internet Lesson</span>
        <span class="ql-desc">How the internet works</span>
      </a>
      <a href="pages/faq.html" class="ql-item">
        <span class="ql-icon">❓</span>
        <span class="ql-title">FAQ</span>
        <span class="ql-desc">Common questions answered</span>
      </a>
    </div>
  </div>

  <script src="assets/js/theme-switcher.js"></script>
</body>
</html>
